owner: gravite-io
repo: status-page

sites:
  - name: App (Frontend)
    url: https://app.gravite.io
  - name: API (Legacy)
    url: https://app.gravite.io/api
    expectedStatusCodes:
      - 200
      - 301
      - 302
  - name: API v2 (NestJS)
    url: https://app.gravite.io/api/v2
    expectedStatusCodes:
      - 200
      - 301
      - 302
      - 404

status-website:
  publish: true
  cname: status.gravite.io
  logoUrl: https://app.gravite.io/favicon.ico
  name: Gravite Status
  theme: light
  navbar:
    - title: Status
      href: /
    - title: Gravite
      href: https://app.gravite.io

i18n:
  activeIncidents: Active Incidents
  pastIncidents: Past Incidents
  scheduledMaintenance: Scheduled Maintenance

workflowSchedule:
  graphs: "0 0 * * *"
  responseTime: "0 23 * * *"
  staticSite: "0 1 * * *"
  summary: "0 0 * * *"
  uptime: "*/5 * * * *"
